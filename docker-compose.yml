services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitask
      POSTGRES_PASSWORD: aitask
      POSTGRES_DB: aitaskqueue
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitask"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      AITASK_DATABASE_URL: postgresql+asyncpg://aitask:aitask@db:5432/aitaskqueue

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
