services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitask
      POSTGRES_PASSWORD: aitask
      POSTGRES_DB: aitaskqueue
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitask"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
